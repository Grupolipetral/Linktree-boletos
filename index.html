<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Boletos - Lipetral</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="./assets/icon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        
        <div class="header">
            <div class="logo-box">
                <img src="./assets/Logo_GrupoLipetral.png" alt="Grupo Lipetral">
            </div>
            <h1 class="title">Portal de Boletos</h1>
            <p class="subtitle">Selecione a empresa abaixo para acessar a plataforma correspondente.</p>
        </div>

        <div class="link-list">
            
            <a href="http://boletos.lipetral.com.br" class="card agro">
                <div class="card-logo">
                    <img src="./assets/Logo_LipetralAgro.png" alt="Lipetral Agro">
                </div>
                <span class="card-text">Lipetral Agro | John Deere</span>
                <svg class="icon-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </a>

            <a href="http://boletos.lipetralmaquinas.com.br" class="card maquinas">
                <div class="card-logo">
                    <img src="./assets/Logo_LipetralMáquinas.png" alt="Lipetral Máquinas">
                </div>
                <span class="card-text">Lipetral Máquinas | Toyota Empilhadeiras</span>
                <svg class="icon-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </a>

            <a href="http://boletos.lipetralirrigacao.com.br" class="card irrigacao">
                <div class="card-logo">
                    <img src="./assets/Logo_LipetralIrrigação.png" alt="Lipetral Irrigação">
                </div>
                <span class="card-text">Lipetral Irrigação | Lindsay</span>
                <svg class="icon-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </a>

            <a href="http://boletos.lipetralmetalmecanica.com.br" class="card metal">
                <div class="card-logo">
                    <img src="./assets/Logo_LipetralMetalmecânica.png" alt="Lipetral Metalmecânica">
                </div>
                <span class="card-text">Lipetral Metalmecânica</span>
                <svg class="icon-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </a>

            <a href="http://boletos.lipetraltransportes.com.br" class="card transportes">
                <div class="card-logo">
                    <img src="./assets/Logo_LipetralTransportes.png" alt="Lipetral Transportes">
                </div>
                <span class="card-text">Lipetral Transportes</span>
                <svg class="icon-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </a>

        </div>
    </div>

</body>
</html>
