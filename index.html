<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Boletos - Lipetral</title>
    
    
    <!-- Importação da fonte Alexandria -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="./assets/icon.ico">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Configuração do Tailwind para usar a fonte Alexandria -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Alexandria', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col items-center justify-center p-6 antialiased">

    <div class="max-w-md w-full flex flex-col items-center gap-8">
        
        <!-- Cabeçalho -->
        <div class="flex flex-col items-center text-center">
            <div class="bg-white p-4 rounded-xl mb-6 shadow-lg">
                <img src="./assets/Logo_GrupoLipetral.png" alt="Grupo Lipetral" class="h-12 object-contain">
            </div>
            <!-- Título: Alexandria Bold -->
            <h1 class="text-3xl font-bold tracking-tight text-white mb-2">Portal de Boletos</h1>
            <!-- Subtítulo: Alexandria SemiBold -->
            <p class="text-slate-400 font-semibold">Selecione a empresa abaixo para acessar a plataforma correspondente.</p>
        </div>

        <!-- Lista de Botões -->
        <div class="w-full flex flex-col gap-4">
            
            <!-- Botão Agro -->
            <a href="http://boletos.lipetral.com.br" class="group glass-panel w-full flex items-center p-3 rounded-2xl border border-[#3A7D32] text-[#3A7D32] transition-all duration-300 hover:bg-[#3A7D32] hover:text-white hover:shadow-[0_0_20px_rgba(58,125,50,0.4)]">
                <div class="bg-white rounded-lg p-3 mr-4 flex-shrink-0">
                    <img src="./assets/Logo_LipetralAgro.png" alt="Lipetral Agro" class="h-8 object-contain">
                </div>
                <span class="text-lg font-normal">Lipetral Agro | John Deere</span>
                <svg class="ml-auto w-6 h-6 transform transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </a>

            <!-- Botão Máquinas -->
            <a href="http://boletos.lipetralmaquinas.com.br" class="group glass-panel w-full flex items-center p-3 rounded-2xl border border-[#CD1B2E] text-[#CD1B2E] transition-all duration-300 hover:bg-[#CD1B2E] hover:text-white hover:shadow-[0_0_20px_rgba(205,27,46,0.4)]">
                <div class="bg-white rounded-lg p-3 mr-4 flex-shrink-0">
                    <img src="./assets/Logo_LipetralMáquinas.png" alt="Lipetral Máquinas" class="h-8 object-contain">
                </div>
                <span class="text-lg font-normal">Lipetral Máquinas | Toyota Empilhadeiras</span>
                <svg class="ml-auto w-6 h-6 transform transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </a>

            <!-- Botão Irrigação -->
            <a href="http://boletos.lipetralirrigacao.com.br" class="group glass-panel w-full flex items-center p-3 rounded-2xl border border-[#A02743] text-[#A02743] transition-all duration-300 hover:bg-[#A02743] hover:text-white hover:shadow-[0_0_20px_rgba(25,94,55,0.4)]">
                <div class="bg-white rounded-lg p-3 mr-4 flex-shrink-0">
                    <img src="./assets/Logo_LipetralIrrigação.png" alt="Lipetral Máquinas" class="h-8 object-contain">
                </div>
                <span class="text-lg font-normal">Lipetral Irrigação | Lindsay</span>
                <svg class="ml-auto w-6 h-6 transform transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </a>

            <!-- Botão Metalmecânica -->
            <a href="http://boletos.lipetralmetalmecanica.com.br" class="group glass-panel w-full flex items-center p-3 rounded-2xl border border-[#2097A0] text-[#2097A0] transition-all duration-300 hover:bg-[#2097A0] hover:text-white hover:shadow-[0_0_20px_rgba(32,151,160,0.4)]">
                <div class="bg-white rounded-lg p-3 mr-4 flex-shrink-0">
                    <img src="./assets/Logo_LipetralMetalmecânica.png" alt="Lipetral Máquinas" class="h-8 object-contain">
                </div>
                <span class="text-lg font-normal">Lipetral Metalmecânica</span>
                <svg class="ml-auto w-6 h-6 transform transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </a>

            <!-- Botão Transportes -->
            <a href="http://boletos.lipetraltransportes.com.br" class="group glass-panel w-full flex items-center p-3 rounded-2xl border border-[#F08219] text-[#F08219] transition-all duration-300 hover:bg-[#F08219] hover:text-white hover:shadow-[0_0_20px_rgba(240,130,25,0.4)]">
                <div class="bg-white rounded-lg p-3 mr-4 flex-shrink-0">
                    <img src="./assets/Logo_LipetralTransportes.png" alt="Lipetral Transportes" class="h-8 object-contain">
                </div>
                <span class="text-lg font-normal">Lipetral Transportes</span>
                <svg class="ml-auto w-6 h-6 transform transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </a>

        </div>
    </div>

</body>
</html>
